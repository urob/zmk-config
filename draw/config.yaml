parse_config:
  zmk_additional_includes:
    - "modules/zmk/helpers/include"

  zmk_preamble: |
    #include <zmk-helpers/key-labels/34.h>
    #define CONFIG_WIRELESS

  raw_binding_map:
    "&sys_reset": Reset
    "&bootloader": Boot
    "&caps_word": Caps Word
    "&kp LA(F4)": Close

    "&bt BT_SEL 0": BT 1
    "&bt BT_SEL 1": BT 2
    "&bt BT_SEL 2": BT 3
    "&bt BT_SEL 3": BT 4

    "&kp LC(INS)": Copy
    "&kp LC(X)": Cut
    "&kp LS(INS)": Paste

    "&kp LG(LC(LEFT))": PDesk
    "&kp LG(LC(RIGHT))": NDesk
    "&kp LG(LC(LS(A)))": PinA.
    "&kp LG(LC(LS(Q)))": PinW.

    "&swapper": NWin
    "&kp LS(TAB)": PWin
    "&dot_spc": Sentence
    "&num_dance": { "t": "Smart"}
    "&magic_shift": { "t": Magic, "h": "Shift" }
    "&smart_mouse": Smart Mouse

    "&hml LS(LALT)TAB": Tab
    "&hm_combo_ldr": Leader
    "&hm_combo_ldrsh": Shift+Leader
    "&hm_combo_lpar": { "t": "< (" }
    "&hm_combo_rpar": { "t": "> )"}
    "&kp LBKT": { "t": "{ ["}
    "&kp RBKT": { "t": "} ]"}

    "&mmv MOVE_UP": Mouse ↑
    "&mmv MOVE_DOWN": Mouse ↓
    "&mmv MOVE_LEFT": Mouse ←
    "&mmv MOVE_RIGHT": Mouse →

    "&msc SCRL_UP": Scroll ↑
    "&msc SCRL_DOWN": Scroll ↓
    "&msc SCRL_LEFT": Scroll ←
    "&msc SCRL_RIGHT": Scroll →

    "&mkp LCLK": Left Click
    "&mkp RCLK": Right Click
    "&mkp MCLK": Middle Click
    "&mkp MB4": Back Click
    "&mkp MB5": Forward Click

  trans_legend: { "t": "", "type": "trans" }

  zmk_combos:
    combo_cut: { align: bottom, o: 0.15 }
    combo_ldrsh: { align: top, o: 1.35 }

    combo_lt: { hidden: true }
    combo_gt: { hidden: true }
    combo_lbrc: { hidden: true }
    combo_rbrc: { hidden: true }

  zmk_keycode_map:
    # custom mappings
    LALT: Alt
    RALT: Alt
    LCTRL: Ctrl
    RCTRL: Ctrl
    LGUI: Gui
    RGUI: Gui
    LSHFT: Shift
    RSHFT: Shift

    BSPC: Bspc
    DEL: Del
    ESC: Esc
    RET: Enter
    SPACE: Spc
    TAB: Tab

    PG_UP: PgUp
    PG_DN: PgDn
    INS: Ins
    HOME: Home
    END: End

    UP: ↑
    DOWN: ↓
    LEFT: ←
    RIGHT: →

    K_CANCEL: Cancel

    C_MUTE: $$mdi:volume-off$$
    C_PP: $$mdi:play-pause$$
    C_VOL_UP: $$mdi:volume-high$$
    C_VOL_DN: $$mdi:volume-medium$$
    C_NEXT: $$mdi:skip-forward$$
    C_PREV: $$mdi:skip-backward$$

    # defaults
    AMPERSAND: "&"
    AMPS: "&"
    APOS: "'"
    APOSTROPHE: "'"
    ASTERISK: "*"
    ASTRK: "*"
    AT: "@"
    AT_SIGN: "@"
    BACKSLASH: \
    BSLH: \
    CARET: ^
    COLON: ":"
    COMMA: ","
    DLLR: $
    DOLLAR: $
    DOT: .
    DOUBLE_QUOTES: '"'
    DQT: '"'
    EQUAL: "="
    EXCL: "!"
    EXCLAMATION: "!"
    FSLH: /
    GRAVE: "`"
    GREATER_THAN: ">"
    GT: ">"
    HASH: "#"
    LBKT: "["
    LBRC: "{"
    LEFT_BRACE: "{"
    LEFT_BRACKET: "["
    LEFT_PARENTHESIS: (
    LESS_THAN: <
    LPAR: (
    LT: <
    MINUS: "-"
    NON_US_BACKSLASH: \
    NON_US_BSLH: "|"
    NON_US_HASH: "#"
    NUHS: "#"
    PERCENT: "%"
    PERIOD: .
    PIPE: "|"
    PIPE2: "|"
    PLUS: +
    POUND: "#"
    PRCNT: "%"
    QMARK: "?"
    QUESTION: "?"
    RBKT: "]"
    RBRC: "}"
    RIGHT_BRACE: "}"
    RIGHT_BRACKET: "]"
    RIGHT_PARENTHESIS: )
    RPAR: )
    SEMI: ;
    SEMICOLON: ;
    SINGLE_QUOTE: "'"
    SLASH: /
    SQT: "'"
    STAR: "*"
    TILDE: "~"
    TILDE2: "~"
    UNDER: _
    UNDERSCORE: _

draw_config:
  append_colon_to_layer_header: false
  dark_mode: false
  footer_text: "urob/zmk-config"
  key_rx: 2
  key_ry: 2
  arc_radius: 2
  small_pad: 4
  legend_rel_y: 1
  outer_pad_w: 10
  outer_pad_h: 10

  glyph_tap_size: 15
  glyph_hold_size: 12
  glyph_shifted_size: 10

  svg_extra_style: |
    svg.keymap {
        --color-bg:                   #f4efed;
        --color-key:                  #ece7e3;
        --color-key-border:           #123046;
        --color-key-border-muted:     #c8c3bf;
        --color-combo-dendron:        #8a8f93;
        --color-text:                 #112f45;
        --color-sub:                  #5a5f63;

        --color-fn:  #6b8aa3;
        --color-nav: #d09b6a;
        --color-num: #b66a3c;
        --color-sys: #9a6b86;

        --color-key-combo-ghost: color-mix(in srgb, var(--color-key) 60%, var(--color-bg) 40%);

        fill: var(--color-text);
        background-color: var(--color-bg);
        font-family: Calibri, system-ui, sans-serif;
        font-size: 16px;
    }

    text                            { letter-spacing: 0.02em; }
    text.tap                        { font-weight: 500; }
    text.hold                       { font-weight: 400; font-size: 13px; }
    text.shifted                    { font-weight: 400; font-size: 11px; }
    text.combo, text.left, text.right, text.tl, text.tr, text.bl, text.br { font-size: 10px; }

    rect.key                        { fill: var(--color-key); stroke: var(--color-key-border); }
    rect.combo, rect.combo-separate { fill: var(--color-key); stroke: var(--color-key-border); stroke-width: 0.75; }
    rect.held, rect.combo.held      { fill: var(--color-key); }
    .layer-Combos rect.key          { fill: var(--color-key-combo-ghost); stroke: var(--color-key-border-muted); stroke-width: 0.75; opacity: 0.35; }

    text.label, text.footer         { fill: var(--color-sub); stroke: var(--color-bg); }
    path.combo                      { stroke: var(--color-combo-dendron); stroke-width: 2; stroke-dasharray: 2, 3; opacity: 0.45; }

    text.tl, use.tl { fill: var(--color-fn); }
    text.tr, use.tr { fill: var(--color-nav); }
    text.bl, use.bl { fill: var(--color-num); }
    text.br, use.br { fill: var(--color-sys); }

    .keypos-30 text.hold { fill: var(--color-nav); }
    .keypos-31 text.hold { fill: var(--color-fn); }
    .keypos-32 text.hold { fill: var(--color-num); font-size: 15px; }
    .keypos-32 text.tap  { fill: var(--color-num); }
    .keypos-33 text.hold { font-size: 15px; }

    @media (prefers-color-scheme: dark) {
        svg.keymap {
            --color-bg:               #4c5963;
            --color-key:              #2a343d;
            --color-key-border:       #66727c;
            --color-key-border-muted: #2a343d; /* Hide ghost key borders. */
            --color-combo-dendron:    #8a949c;

            --color-text: #e6edf2;
            --color-sub:  #c1ccd2;

            --color-fn:  #8fa9bd;
            --color-nav: #e6c07b;
            --color-num: #d19363;
            --color-sys: #b68fa6;
        }
    }
